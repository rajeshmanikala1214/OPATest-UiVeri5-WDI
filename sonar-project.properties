# Project Identification
sonar.projectKey=my-sapui5-app
sonar.projectName=SAPUI5 Pipeline Demo
sonar.projectVersion=1.0

# Path to source code
sonar.sources=webapp
sonar.exclusions=webapp/test/**

# Path to Tests
sonar.tests=webapp/test
sonar.test.inclusions=webapp/test/**/*.js

# Integration with JUnit Reports (Generated by UIVeri5)
sonar.junit.reportPaths=target/report

# JavaScript Coverage (if using LCOV)
sonar.javascript.lcov.reportPaths=coverage/lcov.info